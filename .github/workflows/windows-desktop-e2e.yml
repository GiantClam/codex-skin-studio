name: Windows ChatGPT Desktop Pet E2E

on:
  workflow_dispatch:

jobs:
  desktop:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-save sharp
      - name: Install and start ChatGPT Desktop
        shell: pwsh
        run: |
          winget install --id=9NT1R1C2HH7J --source=msstore --accept-package-agreements --accept-source-agreements --silent
          Get-Process -Name ChatGPT -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          $packages = @(Get-AppxPackage | Where-Object { $_.Name -match 'ChatGPT|OpenAI' })
          $candidates = @()
          foreach ($package in $packages) {
            $candidates += Join-Path $package.InstallLocation 'ChatGPT.exe'
            $candidates += Join-Path $package.InstallLocation 'app\ChatGPT.exe'
          }
          $exe = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $exe) { throw 'ChatGPT.exe was not found in the installed Microsoft Store package' }
          Start-Process -FilePath $exe -ArgumentList '--remote-debugging-address=127.0.0.1', '--remote-debugging-port=9341'
          $deadline = (Get-Date).AddSeconds(90)
          do {
            Start-Sleep -Seconds 2
            try { $targets = Invoke-RestMethod -Uri 'http://127.0.0.1:9341/json/list' -TimeoutSec 3 } catch { $targets = $null }
          } while (-not $targets -and (Get-Date) -lt $deadline)
          if (-not $targets) { Get-Process -Name ChatGPT -ErrorAction SilentlyContinue | Format-List *; throw 'ChatGPT Desktop did not expose the loopback CDP endpoint' }
          Write-Host ("CDP targets: " + ($targets | ConvertTo-Json -Compress))
      - name: Install the example Pet
        shell: pwsh
        run: |
          $pets = Join-Path $env:USERPROFILE '.codex\pets\mascot'
          New-Item -ItemType Directory -Force -Path $pets | Out-Null
          Copy-Item 'skill\codex-skin-studio\examples\pets\mascot\pet.json' (Join-Path $pets 'pet.json') -Force
          Copy-Item 'skill\codex-skin-studio\examples\pets\mascot\spritesheet.webp' (Join-Path $pets 'spritesheet.webp') -Force
      - name: Refresh and select the custom Pet through visible UI
        shell: pwsh
        run: |
          $script = @'
          import { selectPetInChatGptDesktop } from './skill/codex-skin-studio/scripts/pet-desktop.mjs';
          const result = await selectPetInChatGptDesktop({ petId: 'mascot', port: 9341 });
          console.log(JSON.stringify(result, null, 2));
          if (result.selection !== 'native-ui-confirmed' || result.assetLoaded !== true) process.exitCode = 1;
          '@
          node --input-type=module -e $script
