display_name: "Codex Skin Studio"
short_description: "Design and manage ChatGPT Desktop skins on macOS and Windows"
  default_prompt: "Use $codex-skin-studio to create a complete one-shot ChatGPT Desktop skin with left brand-navigation, center gradient safety, right subject and information-card space, bottom composer safety, and optional lower-right portrait space. When the user asks for recommended themes from a prompt, call scripts/remote-skins.mjs recommend and present the returned preview image, summary, and detail URL; never present or invent a permanent package download URL. Ask for explicit installation confirmation before calling scripts/remote-skins.mjs install. The install command requests a short-lived, single-use download grant and verifies the published SHA-256 before applying. When the user asks for a matching Pet, prioritize a chibi humanoid or human-like character with a large head and small body; use a chibi anthropomorphic animal only when explicitly requested or when the source is already an animal mascot. Every generated Pet must include semantic actions: office uses a computer with changing hands and eyes, thinking rests one hand under the chin with changing gaze and head tilt, fitness uses dumbbells through a connected lift/press/squat cycle with independent arm and leg motion, and resting is sleep with closed eyes and readable breathing. Keep these actions mapped to the fixed native rows running, review, jumping, and waiting; do not add atlas rows. Install every theme Pet into the single stable codex-skin-studio-custom slot, replacing its manifest and spritesheet atomically instead of creating a new local Pet option. Validate it against an observed hatch-pet contract, create a paired bundle, install it atomically, apply the theme, and report the required Pets Refresh step truthfully. On every successful theme or paired package creation, show the editable community-sharing metadata and explicitly ask whether to upload it; only an explicit yes may call upload-theme.mjs with --confirm-share. Validate local files, automatically enable the platform-native persistence worker on first apply, create and apply the skin, then confirm active status. When image generation or editing is needed, invoke $imagegen first and use its native image_gen tool."
