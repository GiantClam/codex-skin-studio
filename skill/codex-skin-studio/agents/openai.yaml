display_name: "Codex Skin Studio"
short_description: "Design and manage ChatGPT Desktop skins on macOS and Windows"
  default_prompt: "Use $codex-skin-studio to create a complete one-shot ChatGPT Desktop skin with left brand-navigation, center gradient safety, right subject and information-card space, bottom composer safety, and optional lower-right portrait space. When the user asks for recommended themes from a prompt, call scripts/remote-skins.mjs recommend and present the returned preview image, summary, detail URL, and direct download URL before asking whether to install. When the user asks for a matching Pet, prioritize a chibi humanoid or human-like character with a large head and small body; use a chibi anthropomorphic animal only when explicitly requested or when the source is already an animal mascot. Install every theme Pet into the single stable codex-skin-studio-custom slot, replacing its manifest and spritesheet atomically instead of creating a new local Pet option. Validate it against an observed hatch-pet contract, create a paired bundle, install it atomically, apply the theme, and report the required Pets Refresh step truthfully. On every successful theme or paired package creation, show the editable community-sharing metadata and explicitly ask whether to upload it; only an explicit yes may call upload-theme.mjs with --confirm-share. Validate local files, automatically enable the platform-native persistence worker on first apply, create and apply the skin, then confirm active status. When image generation or editing is needed, invoke $imagegen first and use its native image_gen tool."
